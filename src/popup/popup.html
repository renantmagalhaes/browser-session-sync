<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Browser Session Sync</title>
    <link
      rel="stylesheet"
      href="../styles/styles.css"
    />
  </head>
  <body class="popup-page">
    <div class="popup-container">
      <div class="header">
        <h1>Session Sync</h1>
        <div class="header-actions">
          <button
            id="themeToggle"
            class="icon-button"
            title="Toggle theme"
          >
            🌙
          </button>
          <button
            id="openSettings"
            class="icon-button"
            title="Settings"
          >
            ⚙️
          </button>
        </div>
      </div>

      <div class="status-section">
        <div
          id="statusMessage"
          class="status-message"
        ></div>
        <p
          id="lastSync"
          class="last-sync"
        ></p>
      </div>

      <div class="button-group">
        <button
          id="syncNow"
          class="btn btn-primary"
        >
          🔄 Update Current
        </button>
        <button
          id="saveSnapshot"
          class="btn btn-secondary"
        >
          📸 Save Snapshot
        </button>
        <button
          id="refreshList"
          class="btn btn-secondary"
        >
          🔄 Refresh
        </button>
      </div>

      <div class="view-tabs">
        <button id="tabActive" class="view-tab active">Saved</button>
        <button id="tabTimeline" class="view-tab">Timeline</button>
        <button id="tabArchive" class="view-tab">Archive</button>
      </div>

      <div class="search-section">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search sessions (title, URL, profile)..."
        />
      </div>

      <div id="activeSessionsSection" class="sessions-section">
        <div class="sessions-heading">
          <h2>Active Snapshots</h2>
          <div class="sessions-heading-actions">
            <select
              id="profileFilter"
              class="profile-filter"
            >
              <option value="__all__">
                All Profiles
              </option>
            </select>
          </div>
        </div>
        <div
          id="sessionsList"
          class="sessions-list"
        >
          <p class="loading">
            Loading sessions...
          </p>
        </div>
      </div>

      <div id="timelineSessionsSection" class="sessions-section" style="display: none;">
        <div class="sessions-heading">
          <h2>Timeline Snapshots</h2>
        </div>
        <div class="sessions-list" id="timelineList">
          <p class="empty">No timeline snapshots recorded for today or yesterday.</p>
        </div>
      </div>

      <div id="archiveSessionsSection" class="sessions-section" style="display: none;">
        <div class="sessions-heading">
          <h2>Archived Vault</h2>
        </div>
        <div class="search-section-archive">
           <input
            type="text"
            id="archiveSearchInput"
            class="search-input"
            placeholder="Search archive (title, URL, date)..."
          />
        </div>
        <div
          id="archiveList"
          class="sessions-list"
        >
          <p class="empty">
            Use the search box above to find archived sessions.
          </p>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
