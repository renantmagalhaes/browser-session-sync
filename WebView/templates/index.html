<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Session Sync - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body class="dashboard-active">
    <header>
        <div class="header-left">
            <span class="logo">Sync Codex</span>
            <nav>
                <button class="nav-btn active" data-view="timeline">Timeline</button>
                <button class="nav-btn" data-view="graph">Explorer</button>
                <button class="nav-btn" data-view="settings">Settings</button>
            </nav>
        </div>
        <div class="header-right">
            <div class="view-switcher" id="timelineControls">
                <button class="view-btn active" data-style="list">List</button>
                <button class="view-btn" data-style="grid">Grid</button>
                <button class="view-btn" data-style="compact">Compact</button>
            </div>
            <button id="syncBtn" class="primary-btn">Sync from GitHub</button>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </header>

    <main>
        <div class="toolbar">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" placeholder="Search tabs, titles, or profiles...">
                <span id="searchCount" class="search-count"></span>
            </div>
            <div class="filter-group">
                <label for="profileDropdown" class="filter-label">Profile:</label>
                <div class="select-wrapper">
                    <select id="profileDropdown" class="profile-select">
                        <option value="all">All Profiles</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="timelineView" class="view-container active">
            <div id="timelineList" class="timeline-container list-view">
                <!-- Sessions will be injected here -->
                <div class="loading-shimmer">
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                    <div class="shimmer-card"></div>
                </div>
            </div>
        </div>

        <div id="graphView" class="view-container">
            <div class="graph-header">
                <h2>Relationship Graph</h2>
                <p>Obsidian-style visualization of domain correlations across sessions.</p>
            </div>
            <div id="graphContainer"></div>
        </div>

        <div id="settingsView" class="view-container">
            <div class="settings-header">
                <h2>Configuration</h2>
                <p>Manage your GitHub credentials and dashboard settings.</p>
            </div>
            <div class="settings-card">
                <form id="settingsForm">
                    <div class="form-section">
                        <h3>GitHub Integration</h3>
                        <div class="input-group">
                            <label>GitHub Username</label>
                            <input type="text" id="setting_username" placeholder="e.g. janesmith">
                        </div>
                        <div class="input-group">
                            <label>Repository Name</label>
                            <input type="text" id="setting_repo" placeholder="e.g. my-sessions">
                        </div>
                        <div class="input-group">
                            <label>Personal Access Token (PAT)</label>
                            <input type="password" id="setting_token" placeholder="Leave empty to keep current">
                        </div>
                    </div>
                    
                    <div class="form-section">
                        <h3>Dashboard Security</h3>
                        <div class="input-group">
                            <label>New Dashboard Password</label>
                            <input type="password" id="setting_password" placeholder="Leave empty to keep current">
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="primary-btn">Save Configuration</button>
                        <span id="settingsStatus" class="status-msg"></span>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Modal for session details -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
